<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Kliknij mnie!</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet" />
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: url('https://i.postimg.cc/7PJ6TN7R/7b6de3c9.jpg') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Share Tech Mono', monospace;
            color: #d2d2d2;
            text-align: center;
        }

        button {
            background-color: rgba(0, 0, 0, 0.8);
            border: 2px solid #888;
            color: #d2d2d2;
            padding: 20px 50px;
            font-size: 2em;
            cursor: pointer;
            border-radius: 10px;
            text-transform: uppercase;
            transition: all 0.3s ease;
            box-shadow: 0 0 10px #000;
        }

        button:hover {
            background-color: rgba(255, 255, 255, 0.1);
            color: #fff;
            transform: scale(1.05);
        }

        img {
            margin-top: 40px;
            max-width: 80%;
            border-radius: 10px;
            box-shadow: 0 0 20px #000;
            display: none;
            animation: fadeIn 1s ease-in-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>
    <button id="showImage">Kliknij mnie wcale nie jestem podejżanym linkiem</button>
    <img id="hiddenImage" src="https://i.postimg.cc/3rBDmpjH/86acd4c5-ebb1-4577-b8c3-89a12375595b.png" alt="Obrazek" />

    <script>
        const button = document.getElementById('showImage');
        const image = document.getElementById('hiddenImage');

        button.addEventListener('click', () => {
            image.style.display = 'block';
            button.style.display = 'none';
        });
    </script>
</body>
</html>
